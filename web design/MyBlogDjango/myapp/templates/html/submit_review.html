<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,
    initial-scale=1.0">
    <title>Submit Review</title>

    {% load static %}
    <link rel="stylesheet" type="text/css" href="{% static 'submit_review/submit_review.css'%}">

    <style>
        @font-face 
        {
            font-family: myFont;
            src: url("{% static 'fonts/poppins/Poppins-Regular.ttf' %}");
        }

        * 
        {
            font-family: myFont;
        }
    </style>

</head>

<body>
    <div class="container">
        <h1>Submit a Review</h1>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Submit Review</button>
        </form>
        <a href="{% url 'index' %}">Back to Home</a>
    </div>
    
</body>
</html>
