<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    {% load static %}
    <link rel="stylesheet" type="text/css" href="{% static 'chatbot/chatbot-style.css'%}">
    <script src = "{% static 'chatbot/chatbot.js' %}" defer></script>

    <style>
        @font-face 
        {
            font-family: myFont;
            src: url("{% static 'fonts/poppins/Poppins-Regular.ttf' %}");
        }

        * 
        {
            font-family: myFont;
        }
    </style>

    <title>ChatBot</title>

</head>
<body>
<div class = "page">
    <div class = "linkBar">

    
        <div class = "link-container">
            <a href = "{% url 'index' %}" class = "pageLink">Home</a>
        </div>

        <div class = "link-container">
            <a href = "{% url 'about' %}" class = "pageLink">About</a>
        </div>

        <div class = "link-container">
            <a href = "{% url 'form' %}" class = "pageLink">Form</a>
        </div>

        <div class = "link-container">
            <a href = "{% url 'gallery' %}" class = "pageLink">Gallery</a>
        </div>

        <div class = "link-container">
            <a href = "{% url 'chatbot' %}" class = "pageLink">ChatBot</a>
        </div>

    </div>

    <div class = "midSection">

        <!-- <div> -->
            <div class = "topChat">
                <div class = "chatTitle">
                    ChatBot
                </div>
            </div>

            <div class="chat-container" id="chat-container">

            </div>

            <div class = "chatInput">
                <form id="chat-form">
                    <input type="text" id="user-input" placeholder="Answer Here...">
                    <button type="submit">Send</button>
                </form>
            </div>

        <!-- </div> -->
        



    </div>

    <div class = "bottomBar">
        <p style="color: rgb(219, 219, 219);">&copy; 2024 Victor-Daniel Luca - Blog</p>
        <div class = "link-container"><a class = "pageLink" href = "https://linktr.ee/daniluca091">MyLinks</a></div>
    </div>
</div>

</html>
